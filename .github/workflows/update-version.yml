name: Update version.txt

on:
  push:
    branches:
      - '*'  # Toutes les branches

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Donne la permission d'écrire sur le contenu du repo
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Nécessaire pour avoir l'historique complet
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current branch and commit info
        id: commit-info
        run: |
          # Récupérer le nom de la branche courante
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT
          
          # Récupérer le message du dernier commit
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT
          
          # Récupérer le hash du commit
          COMMIT_HASH=$(git log -1 --pretty=format:"%H")
          echo "commit_hash=$COMMIT_HASH" >> $GITHUB_OUTPUT
          
          # Récupérer la date du commit en UTC puis convertir en heure de Paris
          COMMIT_DATE_UTC=$(git log -1 --pretty=format:"%cd" --date=format:"%Y-%m-%d %H:%M:%S")
          # Convertir UTC en Europe/Paris (UTC+1 ou UTC+2 selon DST)
          COMMIT_DATE_PARIS=$(TZ=Europe/Paris date -d "$COMMIT_DATE_UTC UTC" "+%Y-%m-%d %H:%M:%S")
          echo "commit_date=$COMMIT_DATE_PARIS" >> $GITHUB_OUTPUT

      - name: Create/update version.txt
        run: |
          echo "Branche: ${{ steps.commit-info.outputs.branch }}" > version.txt
          echo "Commit: ${{ steps.commit-info.outputs.commit_hash }}" >> version.txt
          echo "Message: ${{ steps.commit-info.outputs.commit_msg }}" >> version.txt
          echo "Date (Heure de Paris): ${{ steps.commit-info.outputs.commit_date }}" >> version.txt

      - name: Commit and push version.txt
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add version.txt
          # Vérifier s'il y a des changements
          if git diff --cached --quiet; then
            echo "No changes to version.txt"
          else
            git commit -m "Update version.txt for ${{ steps.commit-info.outputs.branch }} [skip ci]"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ steps.commit-info.outputs.branch }}
          fi
