<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Pelote de laine rouge -->
  <circle cx="50" cy="50" r="40" fill="#E74C3C" />
  
  <!-- Fil qui sort de la pelote (en diagonale) -->
  <path d="M30,30 Q50,10 70,30" stroke="#C0392B" stroke-width="3" fill="none" />
  <path d="M25,35 Q45,15 65,35" stroke="#C0392B" stroke-width="3" fill="none" />
  <path d="M20,40 Q40,20 60,40" stroke="#C0392B" stroke-width="3" fill="none" />
  
  <!-- Ombre légère pour donner du relief -->
  <ellipse cx="50" cy="60" rx="35" ry="15" fill="#D62C1A" opacity="0.3" />
</svg>
